<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTM 報表轉換 XLSX 工具</title>
    <!-- 引入 SheetJS 函式庫用於生成 Excel 檔案 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
        }
        .rule-box {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
        }
        .rule-box ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
        .upload-area {
            border: 3px dashed #cbd5e0;
            padding: 40px 20px;
            text-align: center;
            background: #fafbfd;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #3182ce;
            background-color: #f7fafc;
        }
        .upload-area p {
            margin: 0;
            font-size: 16px;
            color: #4a5568;
        }
        .upload-area span {
            color: #3182ce;
            font-weight: bold;
            text-decoration: underline;
        }
        #file-input {
            display: none;
        }
        .btn-convert {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #319795;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn-convert:hover {
            background-color: #2c7a7b;
        }
        .btn-convert:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
        }
        #status-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }
        .success { background-color: #c6f6d5; color: #22543d; }
        .error { background-color: #fed7d7; color: #742a2a; }
    </style>
</head>
<body>

<div class="container">
    <h2>HTM 訂單數量轉換 XLSX 工具</h2>
    
    <div class="rule-box">
        <strong>轉換規則說明：</strong>
        <ul>
            <li>料號 = 擷取自 HTML 內之「物料」；品名 = 擷取自 HTML 內之「說明」。</li>
            <li>當月耗用量 = -(發貨總計 (負值) + 所有 442B / Z02 / 49XXXX 開頭物料文件的數量合計)。</li>
            <li>月初下訂量 = 儲存地點 442B / 異動類型 101 / 物料文件 50XXXX 開頭該列之數量。</li>
        </ul>
    </div>

    <div class="upload-area" id="drop-zone">
        <p>將 HTM 檔案拖曳至此處，或 <span>點擊瀏覽檔案</span></p>
        <input type="file" id="file-input" accept=".htm,.html">
    </div>
    
    <button class="btn-convert" id="btn-process" disabled>開始轉換並下載 Excel</button>
    <div id="status-msg"></div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const btnProcess = document.getElementById('btn-process');
    const statusMsg = document.getElementById('status-msg');
    let loadedFileContent = '';
    let loadedFileName = '';

    // 點擊上傳
    dropZone.addEventListener('click', () => fileInput.click());

    // 檔案選取變更
    fileInput.addEventListener('change', handleFileSelect);

    // 拖曳效果
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        }
    });

    function handleFileSelect() {
        const file = fileInput.files[0];
        if (!file) return;
        
        loadedFileName = file.name;
        const reader = new FileReader();
        reader.onload = function(e) {
            loadedFileContent = e.target.result;
            showStatus(`已成功載入檔案：${loadedFileName}`, 'success');
            btnProcess.disabled = false;
        };
        reader.onerror = function() {
            showStatus('讀取檔案時發生錯誤！', 'error');
            btnProcess.disabled = true;
        };
        reader.readAsText(file, 'UTF-8');
    }

    function showStatus(msg, type) {
        statusMsg.textContent = msg;
        statusMsg.className = type;
        statusMsg.style.display = 'block';
    }

    // 解析特殊文字中的整數值 (如： "8-" 轉為 -8, "15" 轉為 15)
    function parseQty(qtyStr) {
        if (!qtyStr) return 0;
        let clean = qtyStr.replace(/\s+/g, '');
        if (clean.endsWith('-')) {
            return -parseInt(clean.slice(0, -1), 10);
        }
        let val = parseInt(clean, 10);
        return isNaN(val) ? 0 : val;
    }

    // 核心轉換邏輯
    btnProcess.addEventListener('click', () => {
        try {
            // 利用瀏覽器內建 DOMParser 解析 HTML 文字
            const parser = new DOMParser();
            const doc = parser.parseFromString(loadedFileContent, 'text/html');
            
            // 由於原始 HTM 不是標準嚴謹的單一 Table，我們改用文字切分法來精準劃分「物料區塊」
            const sections = loadedFileContent.split(/物料&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;/);
            if (sections.length <= 1) {
                // 如果找不到 &nbsp; 改用一般空白再試一次
                const altSections = loadedFileContent.split(/物料\s+/);
                if (altSections.length <= 1) {
                    throw new Error('找不到標準的「物料」區塊標籤，請確認是否為正確的報表格式。');
                }
            }

            // 重新依照文字精準切分區塊
            const htmlParts = loadedFileContent.split(/物料(?:&nbsp;|\s){5,}/);
            const dataRows = [];

            // 從 index 1 開始，因為 index 0 是第一個物料之前的網頁檔頭
            for (let i = 1; i < htmlParts.length; i++) {
                const sec = htmlParts[i];
                
                // 1. 擷取料號 (直到第一個引號、標籤或換行)
                const matMatch = sec.match(/^([A-Za-z0-9]+)/);
                if (!matMatch) continue;
                const matNo = matMatch[1];

                // 2. 擷取品名 (說明)
                const descMatch = sec.match(/(?:說明)(?:&nbsp;|\s){5,}([^<\n]+)/);
                let desc = descMatch ? descMatch[1].trim() : "";
                // 移除可能的 HTML 轉義字元 (如 &#x2f; 轉 /)
                const txtNode = parser.parseFromString(`<span>${desc}</span>`, 'text/html');
                desc = txtNode.body.textContent.replace(/&nbsp;/g, ' ').trim();

                // 3. 擷取發貨總計
                const dispMatch = sec.match(/發貨總計(?:&nbsp;|\s)+([0-9\-]+)/);
                let dispVal = 0;
                if (dispMatch) {
                    dispVal = parseQty(dispMatch[1]);
                }

                // 4. 解析該區塊底下的表格列 <tr>
                // 建立一個臨時容器來解析此區塊的 HTML
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = sec.split(/<\/table>/)[0] + '</table>'; // 只取到 table 結束
                const trs = tempDiv.querySelectorAll('tr');

                let z02_49_sum = 0;
                let m101_50_sum = 0;

                trs.forEach(tr => {
                    const tds = tr.querySelectorAll('td');
                    if (tds.length >= 7) {
                        const sloc = tds[0].textContent.replace(/\s+/g, '').trim();
                        const mvt = tds[1].textContent.replace(/\s+/g, '').trim();
                        const docNo = tds[3].textContent.replace(/\s+/g, '').trim();
                        const qtyStr = tds[6].textContent.trim();
                        const qty = parseQty(qtyStr);

                        // 規則 2: 所有 442B + Z02 + 49XXXX 數量合計
                        if (sloc === '442B' && mvt === 'Z02' && docNo.startsWith('49')) {
                            z02_49_sum += qty;
                        }

                        // 規則 3: 月初下訂量 = 442B + 101 + 50XXXX
                        if (sloc === '442B' && mvt === '101' && docNo.startsWith('50')) {
                            m101_50_sum += qty;
                        }
                    }
                });

                // 當月耗用量 = -(發貨總計(負值) + 所有442BZ02 49XXXX數量合計)
                const consumption = -(dispVal + z02_49_sum);

                dataRows.push({
                    '料號': matNo,
                    '品名': desc,
                    '當月耗用量': consumption,
                    '月初下訂量': m101_50_sum
                });
            }

            if (dataRows.length === 0) {
                throw new Error('未解析到任何物料資料，請檢查檔案內容是否完整。');
            }

            // 5. 轉換成 Excel 檔案並下載
            const worksheet = XLSX.utils.json_to_sheet(dataRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "訂單數量統計");

            // 自動調整欄寬
            const max_len = dataRows.reduce((w, r) => Math.max(w, r['品名'].length), 10);
            worksheet['!cols'] = [
                { wch: 8 }, // 料號
                { wch: Math.min(max_len * 2, 40) }, // 品名 (考慮中文字寬度)
                { wch: 12 }, // 當月耗用量
                { wch: 12 }  // 月初下訂量
            ];

            // 產生檔名並導出
            const outputName = loadedFileName.replace(/\.[^/.]+$/, "") + "_整理後訂單數量.xlsx";
            XLSX.writeFile(workbook, outputName);
            showStatus(`轉換成功！已下載檔案：${outputName}`, 'success');

        } catch (err) {
            showStatus(`轉換失敗：${err.message}`, 'error');
            console.error(err);
        }
    });
</script>

</body>
</html>
